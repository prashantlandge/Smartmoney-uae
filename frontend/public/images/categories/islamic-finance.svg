<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="isl1" x1="10" y1="10" x2="70" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="dome1" x1="25" y1="10" x2="55" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="40" cy="40" r="36" fill="#10B981" opacity="0.08"/>
  <!-- Mosque base -->
  <rect x="16" y="42" width="48" height="22" rx="2" fill="url(#isl1)" opacity="0.85"/>
  <!-- Main dome -->
  <path d="M28 42Q28 20 40 14Q52 20 52 42Z" fill="url(#dome1)"/>
  <!-- Dome highlight -->
  <path d="M34 42Q34 24 40 18Q42 22 43 42Z" fill="#ffffff" opacity="0.15"/>
  <!-- Crescent & star on top -->
  <circle cx="40" cy="12" r="5" fill="url(#gold1)"/>
  <circle cx="42" cy="11" r="4" fill="url(#dome1)"/>
  <circle cx="37" cy="8" r="1" fill="url(#gold1)"/>
  <!-- Minarets -->
  <rect x="12" y="28" width="6" height="36" rx="1" fill="url(#isl1)"/>
  <circle cx="15" cy="27" r="4" fill="url(#dome1)"/>
  <rect x="62" y="28" width="6" height="36" rx="1" fill="url(#isl1)"/>
  <circle cx="65" cy="27" r="4" fill="url(#dome1)"/>
  <!-- Arched windows -->
  <path d="M30 52Q30 46 34 44Q38 46 38 52Z" fill="#D1FAE5" opacity="0.6"/>
  <path d="M42 52Q42 46 46 44Q50 46 50 52Z" fill="#D1FAE5" opacity="0.6"/>
  <!-- Gold accent line -->
  <rect x="16" y="62" width="48" height="3" rx="1" fill="url(#gold1)" opacity="0.8"/>
  <!-- Halal badge -->
  <circle cx="66" cy="18" r="9" fill="#047857"/>
  <path d="M62 18L65 21L71 15" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
