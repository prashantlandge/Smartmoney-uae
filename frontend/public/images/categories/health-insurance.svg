<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="heart1" x1="20" y1="15" x2="60" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FB7185"/>
      <stop offset="100%" stop-color="#E11D48"/>
    </linearGradient>
    <linearGradient id="cross1" x1="30" y1="20" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#FFE4E6"/>
    </linearGradient>
    <linearGradient id="shield2" x1="10" y1="10" x2="70" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="40" cy="40" r="36" fill="#E11D48" opacity="0.06"/>
  <!-- Shield shape -->
  <path d="M40 6C40 6 14 14 14 30C14 50 40 72 40 72C40 72 66 50 66 30C66 14 40 6 40 6Z" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.5"/>
  <!-- Heart -->
  <path d="M40 28C40 28 32 18 24 24C16 30 24 42 40 54C56 42 64 30 56 24C48 18 40 28 40 28Z" fill="url(#heart1)"/>
  <!-- Heart shine -->
  <path d="M32 26C30 24 26 26 28 30C30 34 36 38 36 38" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Medical cross -->
  <rect x="36" y="30" width="8" height="18" rx="1.5" fill="url(#cross1)" opacity="0.9"/>
  <rect x="31" y="35" width="18" height="8" rx="1.5" fill="url(#cross1)" opacity="0.9"/>
  <!-- Heartbeat line -->
  <path d="M10 56L22 56L26 50L30 62L34 48L38 58L42 54L46 56L70 56" stroke="url(#heart1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Green check badge -->
  <circle cx="62" cy="16" r="9" fill="url(#shield2)"/>
  <path d="M58 16L61 19L67 13" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
