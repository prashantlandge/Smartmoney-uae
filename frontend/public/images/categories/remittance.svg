  </defs>
  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="url(#bg1)" opacity="0.12"/>
  <!-- Globe/Earth outline -->
  <circle cx="40" cy="40" r="22" stroke="url(#bg1)" stroke-width="2.5" fill="none"/>
  <ellipse cx="40" cy="40" rx="10" ry="22" stroke="url(#bg1)" stroke-width="1.5" fill="none"/>
  <line x1="18" y1="40" x2="62" y2="40" stroke="url(#bg1)" stroke-width="1.5"/>
  <line x1="40" y1="18" x2="40" y2="62" stroke="url(#bg1)" stroke-width="1.5"/>
  <!-- Arrow swoosh -->
  <path d="M22 30C28 20 52 18 58 28" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M54 22L58 28L52 30" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M58 50C52 60 28 62 22 52" stroke="#059669" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M26 58L22 52L28 50" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Coin stack -->
